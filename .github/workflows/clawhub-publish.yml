name: Publish SOCKS5 Skill to ClawHub

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1)'
        required: true
        default: '1.0.1'

jobs:
  publish:
    name: Publish Skill
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Error: CLAWHUB_TOKEN secret is not set."
            exit 1
          fi
          
          # Install the ClawHub CLI globally
          npm install -g clawhub || echo "Falling back to npx"
          
          # Authenticate with the ClawHub registry
          npx clawhub login --token "$CLAWHUB_TOKEN"
          
          # Determine version
          # If triggered by workflow_dispatch, use provided version
          # If triggered by push to main, auto-generate version based on run number
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          
          echo "Starting publish at $(date)"
          
          # Publish the version automatically on ClawHub.ai using the CLI
          # We wrap it in 'time' to measure execution duration and enable DEBUG logging
          DEBUG=clawhub*,* time npx clawhub publish . \
            --version "$VERSION" \
            --slug "proxybase-openclaw-skill" \
            --name "ProxyBase" \
            --tags "latest" \
            --registry "https://clawhub.ai/" \
            --changelog "Auto-published from GitHub Actions $GITHUB_SHA" || {
              echo "Publish failed at $(date)"
              exit 1
            }
            
          echo "Finished publish at $(date)"
